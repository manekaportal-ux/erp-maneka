name: Deploy ERP to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to Server
        uses: appleboy/ssh-action@master
        with:
          host: 2.24.130.53
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Copy frontend files
            cp -r /root/erp-project/frontend/src/* /var/www/erp-frontend/src/
            
            # Copy backend file
            cp /root/erp-project/backend/index.js /var/www/erp/index.js
            
            # Pull latest from GitHub
            cd /root/erp-project && git pull origin main
            
            # Copy updated files to live directories
            cp -r /root/erp-project/frontend/src/* /var/www/erp-frontend/src/
            cp /root/erp-project/backend/index.js /var/www/erp/index.js
            
            # Build frontend
            cd /var/www/erp-frontend && npm run build
            
            # Run DB migrations as postgres superuser (maneka_user can't ALTER tables it doesn't own)
            sudo -u postgres psql -d maneka_erp -c "ALTER TABLE entries ADD COLUMN IF NOT EXISTS created_by TEXT DEFAULT ''; ALTER TABLE expenses ADD COLUMN IF NOT EXISTS created_by TEXT DEFAULT '';"

            # Restart backend
            pm2 restart maneka-erp

            echo "Deployment complete!"
